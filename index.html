<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hundesport Analyse Pro v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>Hundesport Analyse Pro</h3>
        </div>
        <div class="sidebar-actions">
            <button onclick="showNewRunForm()">+ Neuer Lauf</button>
            <button class="secondary" onclick="document.getElementById('importFile').click()">Import</button>
            <button class="secondary" onclick="exportData()">Export</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
        </div>
        
        <div class="filters">
            <label>Filter Datum:</label>
            <select id="filterDate" onchange="renderHistory()"></select>
            <label>Filter Event:</label>
            <select id="filterEvent" onchange="renderHistory()"></select>
        </div>

        <div id="analysisList" class="analysis-list"></div>
    </div>

    <!-- MAIN AREA -->
    <div class="main-content">
        
        <div id="newRunForm" class="card hidden">
            <h2>Neuen Lauf erfassen</h2>
            <div class="details-grid">
                <div><label>Datum</label><input type="date" id="runDate"></div>
                <div><label>Veranstaltung</label><input type="text" id="runEvent" placeholder="z.B. Agility WM"></div>
                <div><label>Hund</label><select id="runDog"><option>Riddi</option><option>Clixx</option></select></div>
                <div>
                    <label>Typ</label>
                    <select id="runType" onchange="this.value === 'Turnier' ? document.getElementById('runSubTypeContainer').classList.remove('hidden') : document.getElementById('runSubTypeContainer').classList.add('hidden')">
                        <option value="Training">Training</option>
                        <option value="Turnier">Turnier</option>
                    </select>
                </div>
                <div id="runSubTypeContainer" class="hidden"><label>Bewerb</label><select id="runSubType"><option>A-Lauf</option><option>Jumping</option></select></div>
            </div>
            <label>Video-Datei auswählen:</label>
            <input type="file" id="videoUpload" accept="video/*">
            <div style="margin-top:15px; display: flex; gap: 10px;">
                <button onclick="saveNewRun()">Lauf Speichern & Starten</button>
                <button class="secondary" onclick="hideNewRunForm()">Abbrechen</button>
            </div>
        </div>

        <div id="analysisArea" class="hidden">
            <h2 id="displayTitle"></h2>
            <p id="displayMeta" style="color: #666;"></p>

            <div class="video-wrapper">
                <video id="mainVideo" controls ontimeupdate="updateTimelineMarkers()" onloadedmetadata="renderNotes()"></video>
                <canvas id="drawingCanvas" class="hidden"></canvas>
                <div id="timelineMarkers" class="timeline-markers"></div>
            </div>

            <div class="card">
                <h3>Notiz hinzufügen</h3>
                <div style="display:flex; gap: 10px;">
                    <input type="text" id="noteText" placeholder="Was ist passiert? (Shortcut: N)">
                    <select id="faultType" style="width: 150px;">
                        <option value="Info">Info</option>
                        <option value="Fehler">Allg. Fehler</option>
                        <option value="Stangenfehler">Stangenfehler</option>
                        <option value="Kontaktzonenfehler">Kontaktzone</option>
                        <option value="Verweigerung">Verweigerung</option>
                        <option value="Führung">Führung</option>
                    </select>
                    <button onclick="addNote()">Hinzufügen</button>
                </div>
            </div>

            <div class="card">
                <h3>Fehler / Notizen</h3>
                <div id="notesList"></div>
            </div>
            
            <div style="margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px;">
                 <button class="secondary" onclick="toggleDrawing()">Zeichnen an/aus</button>
                 <button class="secondary" onclick="clearDrawing()">Zeichnung löschen</button>
                 <button class="secondary" onclick="updateVideo()">Video ändern</button> <!-- NEW BUTTON -->
                 <button class="danger" onclick="deleteCurrentRun()">Diesen Lauf löschen</button>
            </div>
            <input type="file" id="updateVideoInput" class="hidden" accept="video/*" onchange="handleVideoUpdate(event)"> <!-- NEW HIDDEN INPUT -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
